<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Transportes - Liberação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        /* Splash Screen */
        #splash { 
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .pulse-logo { 
            width: 300px; 
            animation: heartbeat 1.5s ease-in-out infinite; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.3); } }

        .progress-container { width: 300px; margin-top: 30px; }
        .progress-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #2563eb; width: 0%; animation: fill 2.5s forwards; }
        @keyframes fill { to { width: 100%; } }
        
        .checklist { color: #94a3b8; font-size: 13px; margin-top: 15px; text-align: left; width: 300px; }
        .check-item { opacity: 0; animation: fadeInUp 0.5s forwards; margin-bottom: 5px; }
        .c1 { animation-delay: 0.5s; } .c2 { animation-delay: 1.0s; } .c3 { animation-delay: 1.5s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* Estilo Principal */
        body { margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; margin-top: -10px; transition: background 0.3s, color 0.3s; }
        .header { background: linear-gradient(to right, #0b3eca 0%, #2563eb 30%, #ef4444 65%, #f71c1c 100%); border-bottom: 2px solid #ffffff; flex: 0 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header span { color: #ffffff !important; } 
        .container { max-width: 100vw; margin: 0 auto; flex: 1; width: 100%; padding: 5px 15px 15px 15px; box-sizing: border-box; display: flex; flex-direction: column; min-height: 0; }
        .main { display: grid; grid-template-columns: 49% 49%; grid-template-rows: 48% 48%; justify-content: space-between; align-content: center; gap: 15px 30px; width: 100%; height: 100%; }

        .card, .tv2, .tv3, .quadrante { 
            background: #1e293b; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.2); border-left: 1px solid rgba(255,255,255,0.2);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.5), -5px -5px 10px rgba(255,255,255,0.02);
            transition: background 0.3s;
        }

        .tv1 { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 15px; }
        .big { font-size: clamp(24px, 3.5vw, 48px); font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); line-height: 1; }
        
        /* Estilização das legendas inferiores e caixas de ícones dos Cards */
        .card-label { font-size: 12px; color: #94a3b8; font-weight: 500; margin-top: 2px; }
        .icon-container { display: flex; items-center: center; justify-content: center; width: 44px; height: 44px; border-radius: 10px; }
        
        .tv3 { padding: 10px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(30, 64, 175, 0.8); padding: 6px; font-size: 11px; color: white; transition: background 0.3s, color 0.3s; }
        td { padding: 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }

        .ok { color: #22c55e !important; font-weight: bold; }
        .warn { color: #facc15 !important; font-weight: bold; }
        .bad { color: #ef4444 !important; font-weight: bold; }
        .quadrante-title { font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 10px; color: #ffffff; transition: color 0.3s; }
        .chart-container { position: relative; flex-grow: 1; min-height: 0; width: 100%; }

        /* Estilos do Modo Claro */
        body.light-mode { background: #f8fafc; color: #000000; }
        body.light-mode .card, body.light-mode .tv2, body.light-mode .tv3, body.light-mode .quadrante { background: #ffffff; border-color: rgba(0,0,0,0.1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        body.light-mode .big { text-shadow: none; }
        
        body.light-mode .card div:first-child { color: #475569 !important; }
        body.light-mode .card .big { color: #000000; }
        body.light-mode .text-green-400 { color: #16a34a !important; }
        body.light-mode .text-blue-400 { color: #2563eb !important; }
        body.light-mode .text-red-400 { color: #dc2626 !important; }
        body.light-mode .card-label { color: #64748b; }

        body.light-mode .quadrante-title { color: #000000 !important; }
        body.light-mode th { background: #3b82f6 !important; color: #ffffff !important; }
        body.light-mode td { border-bottom-color: rgba(0,0,0,0.1); color: #000000; }
        body.light-mode td:not(.ok):not(.warn):not(.bad) { color: #000000 !important; }
        body.light-mode .tv2 div { color: #000000 !important; }

        /* Ajustes Mobile Finos */
        @media (max-width: 768px) { 
            body { overflow-y: auto; height: auto; } 
            .header { flex-direction: column; gap: 8px; padding: 10px; text-align: center; }
            .header div { text-align: center !important; }
            .main { grid-template-columns: 1fr; grid-template-rows: auto; gap: 15px; } 
            .tv1 { grid-template-columns: 1fr 1fr; } 
            .card { padding: 10px; height: 95px; }
            .chart-container { height: 220px; min-height: 220px; } 
            .tv3 { overflow-x: auto; max-height: 300px; overflow-y: auto; }
            .table-responsive { overflow-x: auto; }
            .tv4 { grid-template-columns: 1fr !important; } 
        }
    </style>
</head>

<body>

<div id="splash">
    <img src="https://www.grupocasasbahia.com.br/wp-content/uploads/2023/01/logo-gcb-horiz-alt-1024x108.png" class="pulse-logo">
    <div class="progress-container">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="checklist">
            <div class="check-item c1">■ Verificando veículos... ✓</div>
            <div class="check-item c2">■ Processando dados... ✓</div>
            <div class="check-item c3">■ Calculando liberado...</div>
        </div>
    </div>
</div>

<div class="header flex justify-between items-center px-6 py-2">
    <div class="flex items-center gap-4 flex-wrap justify-center">
        <img src="https://www.grupocasasbahia.com.br/wp-content/uploads/2023/01/logo-gcb-horiz-alt-1024x108.png" style="height: 40px; background: white; padding: 5px 15px; border-radius: 20px;">
        <span style="font-size:13px;letter-spacing:1px; font-weight:600;">CONTROL CENTER | LIBERAÇÃO DE CARGAS</span>
    </div>
    <div class="flex items-center gap-4" style="text-align:right;">
        <button id="themeToggle" class="bg-black/20 hover:bg-black/40 text-xl p-1.5 rounded-full transition-colors duration-200 focus:outline-none" title="Alternar tema">
            🌙
        </button>
        <div>
            <div id="data"></div>
            <div id="hora" style="font-size:14px;font-weight:bold;"></div>
        </div>
    </div>
</div>

<div class="container">
    <div class="main">
        <div class="tv1">
            <div class="card flex-row items-center justify-between px-5">
                <div>
                    <div style="font-weight: 600; font-size: 14px; color: #94a3b8;">Total de Cargas</div>
                    <div id="tTotal" class="big my-1"></div>
                    <div class="card-label">cargas</div>
                </div>
                <div class="icon-container bg-blue-500/10 text-blue-500 text-2xl items-center flex">🚚</div>
            </div>

            <div class="card flex-row items-center justify-between px-5">
                <div>
                    <div style="font-weight: 600; font-size: 14px; color: #94a3b8;">Liberadas</div>
                    <div id="tLib" class="big text-green-400 my-1"></div>
                    <div class="card-label">cargas</div>
                </div>
                <div class="icon-container bg-green-500/10 text-green-500 text-2xl items-center flex">✅</div>
            </div>

            <div class="card flex-row items-center justify-between px-5">
                <div>
                    <div style="font-weight: 600; font-size: 14px; color: #94a3b8;">% Liberados</div>
                    <div id="tPerc" class="big text-blue-400 my-1"></div>
                    <div class="card-label">taxa de liberação</div>
                </div>
                <div class="icon-container bg-indigo-500/10 text-indigo-400 text-2xl items-center flex">📊</div>
            </div>

            <div class="card flex-row items-center justify-between px-5">
                <div>
                    <div style="font-weight: 600; font-size: 14px; color: #94a3b8;">Pendentes</div>
                    <div id="tPend" class="big text-red-400 my-1"></div>
                    <div class="card-label">cargas</div>
                </div>
                <div class="icon-container bg-red-500/10 text-red-500 text-2xl items-center flex">⏳</div>
            </div>
        </div>

        <div class="tv2">
            <div style="text-align:center; font-weight:bold; font-size:15px; margin-bottom: 5px;">Cargas por Transportadora</div>
            <div class="chart-container"><canvas id="donut"></canvas></div>
        </div>
        <div class="tv3">
            <div class="table-responsive">
                <table>
                    <thead><tr><th>Transp.</th><th>Cargas</th><th>Lib</th><th>%</th></tr></thead>
                    <tbody id="tabela"></tbody>
                </table>
            </div>
        </div>
        <div class="tv4" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
            <div class="quadrante"><div class="quadrante-title">Tipo Operação</div><div class="chart-container"><canvas id="donutOperacao"></canvas></div></div>
            <div class="quadrante"><div class="quadrante-title">Lib Atraso Portaria</div><div class="chart-container"><canvas id="donutPortaria"></canvas></div></div>
        </div>
    </div>
</div>

<script>
    // Gerenciamento do Splash (apenas no primeiro acesso)
    window.onload = () => {
        if (localStorage.getItem('splashExibido')) {
            document.getElementById('splash').style.display = 'none';
        } else {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').remove();
                    localStorage.setItem('splashExibido', 'true');
                }, 800);
            }, 2500);
        }
    };

    setInterval(() => {
        let d = new Date();
        document.getElementById('data').innerText = d.toLocaleDateString("pt-BR");
        document.getElementById('hora').innerText = d.toLocaleTimeString("pt-BR");
    }, 1000);

    let chart, opChart, portariaChart;
    let ultimaVersao = "";

    const themeToggleBtn = document.getElementById('themeToggle');
    
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        themeToggleBtn.innerText = '☀️';
    }

    themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        themeToggleBtn.innerText = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        atualizarCoresGraficos();
    });

    // Controla a cor do gráfico de barras (TV2)
    function obterCorTextoBarra() {
        return document.body.classList.contains('light-mode') ? '#000000' : '#ffffff';
    }

    // Força as legendas de baixo a mudarem de cor conforme o tema para não sumirem
    function obterCorLegendaRosca() {
        return document.body.classList.contains('light-mode') ? '#000000' : '#ffffff';
    }

    // Mantém estritamente os números de dentro das roscas brancos
    function obterCorTextoRosca() {
        return '#ffffff';
    }

    function atualizarCoresGraficos() {
        const corTextoBarra = obterCorTextoBarra();
        const corLegendaRosca = obterCorLegendaRosca();
        const corTextoRosca = obterCorTextoRosca();
        
        if (chart) {
            chart.options.plugins.datalabels.color = corTextoBarra;
            chart.options.scales.x.ticks.color = corTextoBarra;
            chart.options.scales.y.ticks.color = corTextoBarra;
            chart.update();
        }
        if (opChart) {
            opChart.options.plugins.legend.labels.color = corLegendaRosca;
            opChart.options.plugins.datalabels.color = corTextoRosca;
            opChart.update();
        }
        if (portariaChart) {
            portariaChart.options.plugins.legend.labels.color = corLegendaRosca;
            portariaChart.options.plugins.datalabels.color = corTextoRosca;
            portariaChart.update();
        }
    }

    function atualizarPainel(dados){
        dados = dados.filter(x => Number(x.cargas) > 0);
        let total = dados.reduce((a,b) => a + Number(b.cargas || 0), 0);
        let lib = dados.reduce((a,b) => a + Number(b.liberadas || 0), 0);

        document.getElementById('tTotal').innerText = total;
        document.getElementById('tLib').innerText = lib;
        document.getElementById('tPend').innerText = total - lib;
        document.getElementById('tPerc').innerText = total > 0 ? Math.round((lib/total)*100)+"%" : "0%";

        montarTabela(dados);
        montarBarra(dados);
        montarOperacao(dados);
        montarPortaria(dados);
    }

    function montarTabela(d){
        const tabela = document.getElementById('tabela');
        tabela.innerHTML = "";
        d.forEach(x => {
            let p = x.cargas > 0 ? Math.round((x.liberadas/x.cargas)*100) : 0;
            let cor = p >= 80 ? "ok" : p >= 50 ? "warn" : "bad";
            tabela.innerHTML += `<tr><td style="text-align:left">${x.nome}</td><td>${x.cargas}</td><td>${x.liberadas}</td><td class="${cor}">${p}%</td></tr>`;
        });
    }

    function montarBarra(d){
        d.sort((a,b) => b.cargas - a.cargas);
        let totalCargas = d.reduce((sum, x) => sum + Number(x.cargas), 0);
        const corTextoBarra = obterCorTextoBarra();
        
        if(!chart){
            chart = new Chart(document.getElementById('donut'), {
                type: 'bar', plugins: [ChartDataLabels],
                data: { labels: d.map(x => x.nome), datasets: [{ data: d.map(x => x.cargas), backgroundColor: '#3b82f6' }] },
                options: { 
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false, animation: false, 
                    plugins: { 
                        legend: { display: false },
                        datalabels: { anchor: 'end', align: 'right', color: corTextoBarra, font: { weight: 'bold' }, formatter: (v) => (totalCargas > 0 ? ((v/totalCargas)*100).toFixed(1) + "%" : "0%") }
                    }, 
                    scales: { x: { ticks: { color: corTextoBarra }, max: Math.max(...d.map(x=>x.cargas), 1) * 1.2 }, y: { ticks: { color: corTextoBarra, font: { size: 10 } }, grid: { display: false } } } 
                }
            });
        } else {
            chart.data.labels = d.map(x => x.nome);
            chart.data.datasets[0].data = d.map(x => x.cargas);
            chart.options.plugins.datalabels.color = corTextoBarra;
            chart.options.scales.x.ticks.color = corTextoBarra;
            chart.options.scales.y.ticks.color = corTextoBarra;
            chart.update();
        }
    }

    function obterConfigDoughnut() {
        const corTextoRosca = obterCorTextoRosca();
        const corLegendaRosca = obterCorLegendaRosca();
        return {
            responsive: true, maintainAspectRatio: false, animation: false, cutout: "60%",
            plugins: {
                legend: { position: 'bottom', labels: { color: corLegendaRosca, boxWidth: 10 } },
                datalabels: { color: corTextoRosca, font: { weight: 'bold' }, formatter: (val, ctx) => {
                    let sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
                    let pct = (val / sum * 100).toFixed(1);
                    return `${val} (${pct}%)`;
                }}
            }
        };
    }

    function montarOperacao(d){
        const listaDireta = ["SOUZA E CHIC", "ASAP", "CARRIERS", "BT TRANSPORTES", "BR SAMOR", "EC PEREIRA", "ALA CARGO", "CHÃO BRASIL DIRETA", "TAVARES"];
        const listaPolo = ["ERIVALDO", "LUSIA", "JETTA", "CHÃO BRASIL", "VP LOG", "TWS"];
        let totalDireta = 0, totalPolo = 0;
        d.forEach(x => {
            if(listaDireta.includes(x.nome)) totalDireta += Number(x.cargas);
            else if(listaPolo.includes(x.nome)) totalPolo += Number(x.cargas);
        });

        if(!opChart){
            opChart = new Chart(document.getElementById('donutOperacao'), { type: 'doughnut', plugins: [ChartDataLabels], data: { labels: ["DIRETA", "POLO"], datasets: [{ data: [totalDireta, totalPolo], backgroundColor: ["#3b82f6", "#1e40af"], borderWidth: 0 }] }, options: obterConfigDoughnut() });
        } else { 
            opChart.data.datasets[0].data = [totalDireta, totalPolo]; 
            opChart.options = obterConfigDoughnut();
            opChart.update(); 
        }
    }

    function montarPortaria(d){
        let portaria = d.filter(x => Number(x.saidaPortaria || 0) > 0);
        if(!portariaChart){
            portariaChart = new Chart(document.getElementById('donutPortaria'), { type: 'doughnut', plugins: [ChartDataLabels], data: { labels: portaria.map(x => x.nome), datasets: [{ data: portaria.map(x => x.saidaPortaria), backgroundColor: ["#3b82f6", "#60a5fa"], borderWidth: 0 }] }, options: obterConfigDoughnut() });
        } else { 
            portariaChart.data.labels = portaria.map(x => x.nome); 
            portariaChart.data.datasets[0].data = portaria.map(x => Number(x.saidaPortaria || 0)); 
            portariaChart.options = obterConfigDoughnut();
            portariaChart.update(); 
        }
    }

    async function carregar(){
        try {
            let r = await fetch("https://raw.githubusercontent.com/transportevia/painel-de-liberacao/main/dados.json?v=" + Date.now());
            let dados = await r.json();
            if(JSON.stringify(dados) !== ultimaVersao){
                ultimaVersao = JSON.stringify(dados);
                atualizarPainel(dados);
            }
        } catch(e) { console.error("Erro:", e); }
    }
    carregar();
    setInterval(carregar, 10000);
</script>
</body>
</html>
