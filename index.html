<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Transportes - Liberação</title>
    
    <link class="apple-touch-icon" href="https://www.grupocasasbahia.com.br/wp-content/uploads/2023/09/logo-gcb-blue-alt.png">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Liberação">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        /* Splash Screen */
        #splash { 
            position: fixed; inset: 0; background: #0f172a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.8s ease;
        }
        .pulse-logo { 
            width: 300px; 
            animation: heartbeat 1.5s ease-in-out infinite; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.05); filter: brightness(1.3); } }

        .progress-container { width: 300px; margin-top: 30px; }
        .progress-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; }
        
        /* Tempo da animação da barra ajustado para 3.5 segundos */
        .progress-fill { height: 100%; background: #2563eb; width: 0%; animation: fill 3.5s forwards; }
        @keyframes fill { to { width: 100%; } }
        
        .checklist { color: #94a3b8; font-size: 13px; margin-top: 15px; text-align: left; width: 300px; }
        .check-item { opacity: 0; animation: fadeInUp 0.5s forwards; margin-bottom: 5px; }
        .c1 { animation-delay: 0.7s; } .c2 { animation-delay: 1.5s; } .c3 { animation-delay: 2.3s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* Estilo Base para TV Wall */
        body { 
            margin: 0; 
            padding: 0;
            background: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            transition: background 0.3s, color 0.3s; 
        }
        
        .header { 
            background: linear-gradient(to right, #0b3eca 0%, #2563eb 30%, #ef4444 65%, #f71c1c 100%); 
            border-bottom: 2px solid #ffffff; 
            flex: 0 0 auto; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
            height: 60px;
            display: flex;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }
        .header span { color: #ffffff !important; } 
        
        /* Container principal */
        .container { 
            width: 100% !important;
            max-width: 100vw !important; 
            margin: 0 !important; 
            padding: 16px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            height: calc(100vh - 60px); 
            min-height: 0; 
            flex: 1;
        }

        /* Grid de 2x2 perfeito para as 4 TVs */
        .main { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            gap: 16px; 
            width: 100%; 
            height: 100%; 
            min-height: 0;
            box-sizing: border-box;
        }

        .tv1, .tv2, .tv3, .tv4 {
            min-height: 0;
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        /* Cards Internos */
        .card, .tv2, .tv3, .quadrante { 
            background: #1e293b; 
            border-radius: 12px; 
            padding: 16px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1); 
            border-left: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: background 0.3s;
            min-height: 0; 
            height: 100%;
            width: 100%;
            box-sizing: border-box;
        }

        /* Estrutura do card em modo linha para facilitar flexibilidade */
        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* TV 1: Grid dos 4 Cards */
        .tv1 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr; 
            gap: 16px; 
        }

        /* Textos e Classes Auxiliares de Títulos */
        .card-title {
            font-weight: 600; 
            font-size: 14px; 
            color: #94a3b8;
            text-align: center;
            width: 100%;
        }

        .big { 
            font-size: clamp(24px, 3.5vw, 48px); 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
            line-height: 1; 
            text-align: center;
            width: 100%;
        }
        
        .card-label { font-size: 13px; color: #94a3b8; font-weight: 500; margin-top: 6px; text-align: center; width: 100%; }
        .icon-container { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 50%; margin-bottom: 8px; }
        
        /* TV 3: Tabela de Transportadoras */
        .tv3 { padding: 16px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-start; align-items: stretch; text-align: left; }
        .table-responsive { overflow-y: auto; flex-grow: 1; height: 100%; width: 100%; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(30, 64, 175, 0.9); padding: 8px; font-size: 12px; color: white; transition: background 0.3s, color 0.3s; position: sticky; top: 0; z-index: 10; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }

        .ok { color: #22c55e !important; font-weight: bold; }
        .warn { color: #facc15 !important; font-weight: bold; }
        .bad { color: #ef4444 !important; font-weight: bold; }
        
        .quadrante-title { font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 6px; color: #ffffff; transition: color 0.3s; width: 100%; }
        .chart-container { position: relative; flex-grow: 1; min-height: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        /* --- CORES MODO CLARO --- */
        body.light-mode { background: #f8fafc; color: #000000; }
        body.light-mode .card, body.light-mode .tv2, body.light-mode .tv3, body.light-mode .quadrante { background: #ffffff; border-color: rgba(0,0,0,0.1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        body.light-mode .big { text-shadow: none; }
        
        /* Títulos e Labels no Modo Claro */
        body.light-mode .card-title { color: #475569 !important; }
        body.light-mode .card-label { color: #64748b !important; }
        body.light-mode .quadrante-title { color: #000000 !important; }
        
        /* Cores dos Números Grandes no Modo Claro */
        body.light-mode #tTotal { color: #000000 !important; }
        body.light-mode .text-green-400 { color: #22c55e !important; }
        body.light-mode .text-blue-400 { color: #3b82f6 !important; }
        body.light-mode .text-red-400 { color: #ef4444 !important; }
        
        /* Componentes de Tabelas e Gráficos no Modo Claro */
        body.light-mode th { background: #3b82f6 !important; color: #ffffff !important; }
        body.light-mode td { border-bottom-color: rgba(0,0,0,0.1); color: #000000; }
        body.light-mode td:not(.ok):not(.warn):not(.bad) { color: #000000 !important; }
        body.light-mode .tv2 div { color: #000000 !important; }

        /* RESPONSIVIDADE MOBILE ALTERADA CONFORME A FOTO */
        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            .header { height: auto; padding: 12px; flex-direction: column; gap: 4px; text-align: center; }
            .header div { text-align: center !important; }
            .container { height: auto; min-height: 100vh; overflow: visible; padding: 12px; }
            
            .main { 
                display: flex; 
                flex-direction: column; 
                gap: 15px; 
                height: auto; 
                min-height: auto;
            }
            
            /* Mantém a TV1 em Grid 2x2 no mobile! */
            .tv1 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                height: auto;
            }
            
            /* Ajusta os cards para ficarem divididos horizontalmente como na foto */
            .card {
                height: auto;
                padding: 12px;
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: center !important;
                text-align: left !important;
            }
            .card-content {
                align-items: flex-start !important;
                width: auto;
            }
            .card div { text-align: left !important; }
            .card .big { text-align: left !important; font-size: 28px; }
            .card-title { text-align: left !important; font-size: 12px; }
            .card-label { text-align: left !important; font-size: 11px; margin-top: 2px; }
            .icon-container { margin-bottom: 0 !important; width: 40px; height: 40px; font-size: 1.25rem; }

            .tv2, .tv3 { height: 380px; }
            .tv4 { display: flex !important; flex-direction: column; gap: 15px; height: auto; }
            .quadrante { height: 280px; }
        }
    </style>
</head>

<body>

<div id="splash">
    <img src="https://www.grupocasasbahia.com.br/wp-content/uploads/2023/01/logo-gcb-horiz-alt-1024x108.png" class="pulse-logo">
    <div class="progress-container">
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="checklist">
            <div class="check-item c1">■ Verificando veículos... ✓</div>
            <div class="check-item c2">■ Processando dados... ✓</div>
            <div class="check-item c3">■ Calculando liberado...</div>
        </div>
    </div>
</div>

<div class="header flex justify-between items-center px-6 py-2">
    <div class="flex items-center gap-4 flex-wrap justify-center">
        <img src="https://www.grupocasasbahia.com.br/wp-content/uploads/2023/01/logo-gcb-horiz-alt-1024x108.png" style="height: 40px; background: white; padding: 5px 15px; border-radius: 20px;">
        <span style="font-size:13px;letter-spacing:1px; font-weight:600;">CONTROL CENTER | LIBERAÇÃO DE CARGAS</span>
    </div>
    <div class="flex items-center gap-4 text-right">
        <button id="themeToggle" class="bg-black/20 hover:bg-black/40 text-xl p-1.5 rounded-full transition-colors duration-200 focus:outline-none" title="Alternar tema">
            🌙
        </button>
        <div>
            <div id="data"></div>
            <div id="hora" style="font-size:14px;font-weight:bold;"></div>
        </div>
    </div>
</div>

<div class="container">
    <div class="main">
        <!-- TV 1: Painel Geral Centralizado (Superior Esquerdo) -->
        <div class="tv1">
            <div class="card">
                <div class="card-content">
                    <div class="card-title">Total de Cargas</div>
                    <div id="tTotal" class="big my-1">0</div>
                    <div class="card-label">cargas</div>
                </div>
                <div class="icon-container bg-blue-500/10 text-blue-500 text-2xl">🚚</div>
            </div>

            <div class="card">
                <div class="card-content">
                    <div class="card-title">Liberadas</div>
                    <div id="tLib" class="big text-green-400 my-1">0</div>
                    <div class="card-label">cargas</div>
                </div>
                <div class="icon-container bg-green-500/10 text-green-500 text-2xl">✅</div>
            </div>

            <div class="card">
                <div class="card-content">
                    <div class="card-title">% Liberados</div>
                    <div id="tPerc" class="big text-blue-400 my-1">0%</div>
                    <div class="card-label">taxa de liberação</div>
                </div>
                <div class="icon-container bg-indigo-500/10 text-indigo-400 text-2xl">📊</div>
            </div>

            <div class="card">
                <div class="card-content">
                    <div class="card-title">Pendentes</div>
                    <div id="tPend" class="big text-red-400 my-1">0</div>
                    <div class="card-label">cargas</div>
                </div>
                <div class="icon-container bg-red-500/10 text-red-500 text-2xl">⏳</div>
            </div>
        </div>

        <!-- TV 2: Gráfico de Cargas por Transportadora (Superior Direito) -->
        <div class="tv2">
            <div style="text-align:center; font-weight:bold; font-size:14px; margin-bottom: 5px;">Cargas por Transportadora</div>
            <div class="chart-container"><canvas id="donut"></canvas></div>
        </div>

        <!-- TV 3: Tabela Detalhada das Transportadoras (Inferior Esquerdo) -->
        <div class="tv3">
            <div class="table-responsive">
                <table>
                    <thead><tr><th style="text-align:left;">Transp.</th><th>Cargas</th><th>Lib</th><th>%</th></tr></thead>
                    <tbody id="tabela"></tbody>
                </table>
            </div>
        </div>

        <!-- TV 4: Gráficos de Tipo de Operação e Atrasos (Inferior Direito) -->
        <div class="tv4" style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; min-height: 0;">
            <div class="quadrante">
                <div class="quadrante-title">Tipo Operação</div>
                <div class="chart-container"><canvas id="donutOperacao"></canvas></div>
            </div>
            <div class="quadrante">
                <div class="quadrante-title">Lib Atraso Portaria</div>
                <div class="chart-container"><canvas id="donutPortaria"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Registro do Service Worker para PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Registrado!'))
          .catch((err) => console.log('Erro no Service Worker:', err));
    }

    // Controle do Splash Screen
    function ocultarSplash() {
        const splash = document.getElementById('splash');
        if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.remove();
                localStorage.setItem('splashExibido', 'true');
            }, 800);
        }
    }

    if (localStorage.getItem('splashExibido')) {
        const splash = document.getElementById('splash');
        if (splash) splash.style.display = 'none';
    } else {
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(ocultarSplash, 3500);
        });
        setTimeout(ocultarSplash, 5500);
    }

    // Atualização de Data e Hora
    setInterval(() => {
        let d = new Date();
        document.getElementById('data').innerText = d.toLocaleDateString("pt-BR");
        document.getElementById('hora').innerText = d.toLocaleTimeString("pt-BR");
    }, 1000);

    let chart, opChart, portariaChart;
    let ultimaVersao = "";

    const themeToggleBtn = document.getElementById('themeToggle');
    
    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        themeToggleBtn.innerText = '☀️';
    }

    themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        themeToggleBtn.innerText = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        atualizarCoresGraficos();
    });

    function obterCorTextoBarra() {
        return document.body.classList.contains('light-mode') ? '#000000' : '#ffffff';
    }

    function obterCorLegendaRosca() {
        return document.body.classList.contains('light-mode') ? '#000000' : '#ffffff';
    }

    function obterCorTextoRosca() {
        return '#ffffff';
    }

    function atualizarCoresGraficos() {
        const colorTextoBarra = obterCorTextoBarra();
        const textLegendsColor = obterCorLegendaRosca();
        const corTextoRosca = obterCorTextoRosca();
        
        if (chart) {
            chart.options.plugins.datalabels.color = colorTextoBarra;
            chart.options.scales.x.ticks.color = colorTextoBarra;
            chart.options.scales.y.ticks.color = colorTextoBarra;
            chart.update();
        }
        if (opChart) {
            opChart.options.plugins.legend.labels.color = textLegendsColor;
            opChart.options.plugins.datalabels.color = corTextoRosca;
            opChart.update();
        }
        if (portariaChart) {
            portariaChart.options.plugins.legend.labels.color = textLegendsColor;
            portariaChart.options.plugins.datalabels.color = corTextoRosca;
            portariaChart.update();
        }
    }

    function atualizarPainel(dados){
        dados = dados.filter(x => Number(x.cargas) > 0);
        let total = dados.reduce((a,b) => a + Number(b.cargas || 0), 0);
        let lib = dados.reduce((a,b) => a + Number(b.liberadas || 0), 0);

        document.getElementById('tTotal').innerText = total;
        document.getElementById('tLib').innerText = lib;
        document.getElementById('tPend').innerText = total - lib;
        document.getElementById('tPerc').innerText = total > 0 ? Math.round((lib/total)*100)+"%" : "0%";

        montarTabela(dados);
        montarBarra(dados);
        montarOperacao(dados);
        montarPortaria(dados);
    }

    function montarTabela(d){
        const tabela = document.getElementById('tabela');
        tabela.innerHTML = "";
        d.forEach(x => {
            let p = x.cargas > 0 ? Math.round((x.liberadas/x.cargas)*100) : 0;
            let cor = p >= 80 ? "ok" : p >= 50 ? "warn" : "bad";
            tabela.innerHTML += `<tr><td style="text-align:left">${x.nome}</td><td>${x.cargas}</td><td>${x.liberadas}</td><td class="${cor}">${p}%</td></tr>`;
        });
    }

    function montarBarra(d){
        d.sort((a,b) => b.cargas - a.cargas);
        let totalCargas = d.reduce((sum, x) => sum + Number(x.cargas), 0);
        const colorTextoBarra = obterCorTextoBarra();
        
        if(!chart){
            chart = new Chart(document.getElementById('donut'), {
                type: 'bar', plugins: [ChartDataLabels],
                data: { labels: d.map(x => x.nome), datasets: [{ data: d.map(x => x.cargas), backgroundColor: '#3b82f6' }] },
                options: { 
                    indexAxis: 'y', responsive: true, maintainAspectRatio: false, animation: false, 
                    plugins: { 
                        legend: { display: false },
                        datalabels: { anchor: 'end', align: 'right', color: colorTextoBarra, font: { weight: 'bold', size: 10 }, formatter: (v) => (totalCargas > 0 ? ((v/totalCargas)*100).toFixed(1) + "%" : "0%") }
                    }, 
                    scales: { x: { ticks: { color: colorTextoBarra, font: { size: 9 } }, max: Math.max(...d.map(x=>x.cargas), 1) * 1.25 }, y: { ticks: { color: colorTextoBarra, font: { size: 10 } }, grid: { display: false } } } 
                }
            });
        } else {
            chart.data.labels = d.map(x => x.nome);
            chart.data.datasets[0].data = d.map(x => x.cargas);
            chart.options.plugins.datalabels.color = colorTextoBarra;
            chart.options.scales.x.ticks.color = colorTextoBarra;
            chart.options.scales.y.ticks.color = colorTextoBarra;
            chart.options.scales.x.max = Math.max(...d.map(x=>x.cargas), 1) * 1.25;
            chart.update();
        }
    }

    function obterConfigDoughnut() {
        const corTextoRosca = obterCorTextoRosca();
        const textLegendsColor = obterCorLegendaRosca();
        return {
            responsive: true, maintainAspectRatio: false, animation: false, cutout: "55%",
            plugins: {
                legend: { position: 'bottom', labels: { color: textLegendsColor, boxWidth: 8, font: { size: 9 } } },
                datalabels: { color: corTextoRosca, font: { weight: 'bold', size: 9 }, formatter: (val, ctx) => {
                    let sum = ctx.dataset.data.reduce((a, b) => a + b, 0);
                    if (sum === 0) return '';
                    let pct = (val / sum * 100).toFixed(0);
                    return `${val}\n(${pct}%)`;
                }}
            }
        };
    }

    function montarOperacao(d){
        const listaDireta = ["SOUZA E CHIC", "ASAP", "CARRIERS", "BT TRANSPORTES", "BR SAMOR", "EC PEREIRA", "ALA CARGO", "CHÃO BRASIL DIRETA", "TAVARES"];
        const listaPolo = ["ERIVALDO", "LUSIA", "JETTA", "CHÃO BRASIL", "VP LOG", "TWS"];
        let totalDireta = 0, totalPolo = 0;
        d.forEach(x => {
            if(listaDireta.includes(x.nome)) totalDireta += Number(x.cargas);
            else if(listaPolo.includes(x.nome)) totalPolo += Number(x.cargas);
        });

        if(!opChart){
            opChart = new Chart(document.getElementById('donutOperacao'), { type: 'doughnut', plugins: [ChartDataLabels], data: { labels: ["DIRETA", "POLO"], datasets: [{ data: [totalDireta, totalPolo], backgroundColor: ["#3b82f6", "#1e40af"], borderWidth: 0 }] }, options: obterConfigDoughnut() });
        } else { 
            opChart.data.datasets[0].data = [totalDireta, totalPolo]; 
            opChart.options = obterConfigDoughnut();
            opChart.update(); 
        }
    }

    function montarPortaria(d){
        let portaria = d.filter(x => Number(x.saidaPortaria || 0) > 0);
        if(!portariaChart){
            portariaChart = new Chart(document.getElementById('donutPortaria'), { type: 'doughnut', plugins: [ChartDataLabels], data: { labels: portaria.map(x => x.nome), datasets: [{ data: portaria.map(x => x.saidaPortaria), backgroundColor: ["#3b82f6", "#60a5fa", "#93c5fd", "#bfdbfe"], borderWidth: 0 }] }, options: obterConfigDoughnut() });
        } else { 
            portariaChart.data.labels = portaria.map(x => x.nome); 
            portariaChart.data.datasets[0].data = portaria.map(x => Number(x.saidaPortaria || 0)); 
            portariaChart.options = obterConfigDoughnut();
            portariaChart.update(); 
        }
    }

    async function carregar(){
        try {
            let r = await fetch(
                "https://raw.githubusercontent.com/transportevia/painel-de-liberacao/main/dados.json?t=" + Date.now(),
                { cache: "no-store" }
            );
            
            let dados = await r.json();
            
            if (Array.isArray(dados)) {
                if(JSON.stringify(dados) !== ultimaVersao){
                    ultimaVersao = JSON.stringify(dados);
                    atualizarPainel(dados);
                }
            } else {
                console.warn("Atenção: Os dados recebidos não vieram em formato de lista (Array).", dados);
            }
        } catch(e) { 
            console.error("Erro na requisição dos dados:", e); 
        }
    }
    
    carregar();
    setInterval(carregar, 5000);
</script>
</body>
</html>
